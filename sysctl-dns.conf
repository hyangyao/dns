# =============================================================================
# sysctl-dns.conf — DNS 服务器内核网络调优
#
# 部署目标：Azure B2ast（2 vCPU / 1 GB RAM）— 日本东部
# 优化场景：跨境 DNS 传输（日本 → 中国青岛）
# 部署方式：由 deploy-unbound.sh 复制至 /etc/sysctl.d/99-dns.conf
#
# 注意：本文件仅含 DNS 层及网络层内核参数。
#       OS 加固参数（SSH、内核安全加固等）已由运营团队单独管理。
# =============================================================================

# -----------------------------------------------------------------------------
# 跨境路由优化 — 日本↔青岛低延迟高吞吐
#
# BBR（Bottleneck Bandwidth and RTT）：
#   Google 设计的拥塞控制算法，在高延迟、轻度丢包链路（如中日跨境）上
#   相比传统 CUBIC 可显著提升吞吐量，减少重传引发的 DNS 超时。
#
# fq（Fair Queue）：
#   BBR 的配套队列规则，为每个流公平分配发送时隙，
#   防止大流量 DNS 请求突发占满队列导致小包延迟。
#
# tcp_fastopen=3：
#   同时在客户端（=1）和服务端（=2）启用 TCP Fast Open（=3）。
#   减少 DoT/DoH 握手时的 TCP 往返次数，对跨境高 RTT 场景尤为关键。
# -----------------------------------------------------------------------------
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr
net.ipv4.tcp_fastopen = 3

# -----------------------------------------------------------------------------
# UDP/TCP 高负载缓冲区调优 — 内存安全（1 GB 机器）
#
# rmem_max / wmem_max = 8 MB：
#   套接字接收/发送缓冲区上限。DNS 以 UDP 为主，适当的缓冲区可在
#   跨境突发流量下降低丢包率，同时 8 MB 不会在 1 GB 环境下造成内存压力。
#   （unbound.conf 中 so-rcvbuf/so-sndbuf 设为 4 MB，在此上限范围内）
#
# udp_rmem_min / udp_wmem_min = 16 KB：
#   每个 UDP 套接字的最小缓冲区保障，防止高并发时个别流分配不到缓冲区。
#
# netdev_max_backlog = 5000：
#   网卡驱动向内核协议栈递交数据包的队列长度。
#   DNS 流量突发（如 DDoS 探测）时，避免过早丢弃入站数据包。
# -----------------------------------------------------------------------------
net.core.rmem_max = 8388608
net.core.wmem_max = 8388608
net.ipv4.udp_rmem_min = 16384
net.ipv4.udp_wmem_min = 16384
net.core.netdev_max_backlog = 5000
