# =============================================================================
# unbound.conf — Azure B2ast（2 vCPU / 1 GB RAM）生产级配置
#
# 部署区域：日本东部 → 服务青岛客户端
# 合规标准：CIS DNS 基准 · PCI-DSS v4.0
# 适用版本：Unbound ≥ 1.13（Ubuntu 22.04/24.04）
#
# 前提条件：
#   OS 加固（SSH、用户账户、Nginx）已由运营团队按 CIS 规范完成。
#   本文件仅涵盖 Unbound 层面的配置。
# =============================================================================

server:

    # -------------------------------------------------------------------------
    # 监听接口
    # -------------------------------------------------------------------------
    interface: 0.0.0.0
    port: 53

    # DoT（853端口）— 在 TLS 证书就绪前保持注释，
    # 启用方式：取消下行注释并填写证书路径。
    # interface: 0.0.0.0@853
    # tls-service-key: "/etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem"
    # tls-service-pem: "/etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem"
    # tls-port: 853
    # tls-min-version: "TLSv1.2"

    do-ip4: yes
    do-ip6: no
    do-udp: yes
    do-tcp: yes

    # -------------------------------------------------------------------------
    # 访问控制 — PCI-DSS 要求1（默认拒绝，白名单授权）
    # -------------------------------------------------------------------------
    access-control: 0.0.0.0/0 refuse
    access-control: 127.0.0.0/8 allow
    # 在此处添加您的青岛客户端 IP 或网段：
    # access-control: <YOUR_CLIENT_IP>/32 allow
    # access-control: <YOUR_SUBNET>/24 allow

    # -------------------------------------------------------------------------
    # 内存缓存 — 严格控制于 1 GB 总内存环境（防 OOM）
    #
    # 总缓存预算 ≈ 128 MB（约占 1 GB 的 13%，为 OS 和 Unbound 进程留出余量）：
    #   rrset-cache-size  64 MB — 存储 DNS 记录集（最大缓存区）
    #   msg-cache-size    32 MB — 存储完整 DNS 响应（约为 rrset 的一半）
    #   key-cache-size    16 MB — 存储 DNSSEC 密钥材料
    #   neg-cache-size    16 MB — 存储否定响应（NXDOMAIN / NODATA）
    # -------------------------------------------------------------------------
    msg-cache-size: 32m
    rrset-cache-size: 64m
    key-cache-size: 16m
    neg-cache-size: 16m

    # 基础架构缓存（RTT 追踪、故障服务器记录）
    infra-cache-numhosts: 10000

    # -------------------------------------------------------------------------
    # CPU 线程与分片 — 2 vCPU
    #
    # 分片数须为 2 的幂次，且 ≥ num-threads；
    # 将各缓存分区，减少线程间互斥锁争用。
    # -------------------------------------------------------------------------
    num-threads: 2
    msg-cache-slabs: 2
    rrset-cache-slabs: 2
    infra-cache-slabs: 2
    key-cache-slabs: 2

    # -------------------------------------------------------------------------
    # 跨境低延迟优化 — 日本↔青岛链路
    #
    # serve-expired:      在上游不可达时（链路抖动、BGP 重路由）继续服务过期记录
    # serve-expired-ttl:  过期记录最长服务时长（86400s = 24h），覆盖中日链路中断场景
    # prefetch:           在记录 TTL 剩余 10% 时提前主动刷新，减少缓存未命中
    # prefetch-key:       DNSSEC 密钥同步预取，避免验证链断链
    # edns-buffer-size:   1232 字节（RFC 8900 推荐值），避免跨境路径上的 IP 分片丢包
    # -------------------------------------------------------------------------
    serve-expired: yes
    serve-expired-ttl: 86400
    prefetch: yes
    prefetch-key: yes
    edns-buffer-size: 1232

    # -------------------------------------------------------------------------
    # 高负载 / 高可用
    #
    # so-reuseport:            允许多线程共享同一 UDP 监听端口（内核均衡分发）
    # outgoing-range:          每线程最大出站并发查询数
    # num-queries-per-thread:  每线程入站请求队列深度
    # so-rcvbuf / so-sndbuf:   套接字缓冲区，与 sysctl rmem_max/wmem_max（8 MB）对齐
    # -------------------------------------------------------------------------
    so-reuseport: yes
    outgoing-range: 4096
    num-queries-per-thread: 2048
    so-rcvbuf: 4m
    so-sndbuf: 4m

    # -------------------------------------------------------------------------
    # 安全加固 / DNS 层合规
    # CIS DNS 基准 2.x · PCI-DSS 要求 2、6、10
    # -------------------------------------------------------------------------

    # 隐藏软件指纹（CIS DNS 2.1 / PCI-DSS 要求2）
    hide-identity: yes
    hide-version: yes
    identity: ""

    # DNSSEC 验证加固
    harden-glue: yes               # 拒绝粘合记录与权威响应不一致的回答
    harden-dnssec-stripped: yes    # 对应签名域拒绝无 RRSIG 的响应
    harden-algo-downgrade: yes     # 拒绝将 DNSSEC 算法降级的响应
    harden-below-nxdomain: yes     # 拒绝 NXDOMAIN 父域下的无效子域回答

    # QNAME 最小化（RFC 7816）— 减少向上游泄露的查询信息
    qname-minimisation: yes

    # 0x20 随机大小写（Kaminsky 变体攻击防护）
    use-caps-for-id: yes

    # TTL 边界 — 缓解负缓存攻击
    cache-min-ttl: 60
    cache-max-ttl: 86400

    # DNSSEC 信任锚（由 deploy-unbound.sh 中 unbound-anchor 初始化）
    auto-trust-anchor-file: "/var/lib/unbound/root.key"

    # 根提示（由 deploy-unbound.sh 下载）
    root-hints: "/var/lib/unbound/root.hints"

    # 速率限制 — 防 DNS 放大攻击（PCI-DSS 要求6）
    ratelimit: 1000       # 每权威区每秒最大 QPS；超出返回 REFUSED
    ip-ratelimit: 100     # 每客户端 IP 每秒最大 QPS

    # 禁用 ANY 查询 — 消除 DNS 放大攻击向量（CIS DNS / PCI-DSS 要求6）
    # ANY 查询会返回大型多记录响应，常被用于放大 DDoS；
    # 对 ANY 返回 HINFO，符合 RFC 8482 规范。
    local-zone: "." nodefault
    deny-any: yes

    # -------------------------------------------------------------------------
    # 日志 — PCI-DSS 要求10（审计所有 DNS 基础设施访问）
    # 日志通过 syslog 写入，由 rsyslog/journald 进行持久化与轮转。
    # 生产高流量场景可将 log-queries/log-replies 设为 no 以降低 I/O 压力。
    # -------------------------------------------------------------------------
    use-syslog: yes
    verbosity: 1
    log-queries: yes
    log-replies: yes
    log-servfail: yes

    # -------------------------------------------------------------------------
    # 本地静态区域 — 防止私有域名泄漏到公网上游
    # -------------------------------------------------------------------------
    local-zone: "localhost." static
    local-data: "localhost. 10800 IN A 127.0.0.1"
    local-zone: "127.in-addr.arpa." static
    local-data: "1.0.0.127.in-addr.arpa. 10800 IN PTR localhost."

# =============================================================================
# 远程控制 — Unix 域套接字（无需 TLS 密钥文件）
#
# 常用命令：
#   sudo unbound-control stats_noreset   # 查看统计信息（不重置）
#   sudo unbound-control reload          # 热重载配置
#   sudo unbound-control flush_zone .    # 清空全部缓存
# =============================================================================
remote-control:
    control-enable: yes
    control-interface: /run/unbound.ctl
