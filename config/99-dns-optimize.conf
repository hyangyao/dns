# =============================================================================
# 99-dns-optimize.conf — Kernel network optimisation for a Public DNS server
#
# Target:     Azure B2ast (2 vCPU / 1 GB RAM), Ubuntu 22.04/24.04 LTS
# Compliance: CIS Benchmarks (Ubuntu) · PCI-DSS v4.0
#
# Deploy:
#   sudo cp config/99-dns-optimize.conf /etc/sysctl.d/99-dns-optimize.conf
#   sudo sysctl --system
#
# IMPORTANT: The nf_conntrack settings at the bottom require the nf_conntrack
# kernel module to be loaded BEFORE applying (UFW loads it automatically).
# deploy.sh handles the correct ordering: UFW enable → sysctl apply.
# =============================================================================

# -----------------------------------------------------------------------------
# TCP Congestion Control — BBR
# Reduces latency and improves throughput on lossy cross-border links.
# China–Japan routes typically experience 1–5% packet loss and 50–100 ms RTT.
# BBR is available in Linux kernel ≥ 4.9 (Ubuntu 22.04 ships kernel 5.15).
# -----------------------------------------------------------------------------
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# -----------------------------------------------------------------------------
# Socket buffer sizes — sustain DNS performance under burst load
# Larger UDP buffers prevent packet drops when many queries arrive at once.
# Values match Unbound's so-rcvbuf / so-sndbuf settings (4 MB).
# Kept moderate to respect the 1 GB RAM budget.
# -----------------------------------------------------------------------------
net.core.rmem_max = 4194304
net.core.wmem_max = 4194304
net.core.rmem_default = 262144
net.core.wmem_default = 262144

# UDP buffers (DNS is primarily UDP)
net.ipv4.udp_mem = 65536 131072 262144

# TCP buffers (for DNS-over-TLS connections)
net.ipv4.tcp_rmem = 4096 87380 4194304
net.ipv4.tcp_wmem = 4096 65536 4194304

# Maximum socket connection backlog
net.core.somaxconn = 1024
net.core.netdev_max_backlog = 5000

# -----------------------------------------------------------------------------
# SYN Flood protection — CIS Benchmark 3.3.2 / PCI-DSS Req. 1
# -----------------------------------------------------------------------------
net.ipv4.tcp_syncookies = 1

# Reduce TIME_WAIT duration; allow safe outgoing connection reuse
net.ipv4.tcp_fin_timeout = 15
net.ipv4.tcp_tw_reuse = 1

# -----------------------------------------------------------------------------
# IP forwarding — DISABLED · PCI-DSS Req. 1
# This VM is a DNS resolver only; forwarding makes it a router attack vector.
# -----------------------------------------------------------------------------
net.ipv4.ip_forward = 0
net.ipv6.conf.all.forwarding = 0

# -----------------------------------------------------------------------------
# ICMP hardening — CIS 3.3.1
# Reject redirects that could alter the kernel routing table.
# -----------------------------------------------------------------------------
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# Log packets with impossible (martian) source addresses
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# Ignore ICMP broadcast pings (Smurf amplification mitigation)
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Discard bogus ICMP error responses
net.ipv4.icmp_ignore_bogus_error_responses = 1

# -----------------------------------------------------------------------------
# IPv6 — disabled (reduces attack surface · CIS 3.1.1)
# Re-enable if IPv6 clients or upstream forwarders are required.
# -----------------------------------------------------------------------------
net.ipv6.conf.all.disable_ipv6 = 1
net.ipv6.conf.default.disable_ipv6 = 1
net.ipv6.conf.lo.disable_ipv6 = 1

# -----------------------------------------------------------------------------
# Connection tracking — tuned for high-volume DNS UDP flows
# DNS generates many short-lived UDP sessions; a small conntrack table causes
# "nf_conntrack: table full, dropping packet" under load.
#
# PREREQUISITE: The nf_conntrack module must be loaded before these settings
# are applied. deploy.sh enables UFW first (which loads nf_conntrack) and
# then calls `sysctl --system`. Do NOT apply these manually before UFW is on.
# To load manually: modprobe nf_conntrack
# For persistence:  echo "nf_conntrack" >> /etc/modules
# -----------------------------------------------------------------------------
net.netfilter.nf_conntrack_max = 131072
net.netfilter.nf_conntrack_udp_timeout = 30
net.netfilter.nf_conntrack_udp_timeout_stream = 60

# -----------------------------------------------------------------------------
# Virtual memory — OOM prevention on 1 GB RAM · PCI-DSS availability
# swappiness=10 : strongly prefer RAM; swap only under genuine pressure
# overcommit_memory=0 : heuristic mode (OS default); rejects allocations that
#   would clearly exhaust available memory — safer than =1 on constrained hosts
# -----------------------------------------------------------------------------
vm.swappiness = 10
vm.overcommit_memory = 0
