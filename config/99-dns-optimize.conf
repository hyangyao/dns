# =============================================================================
# 99-dns-optimize.conf — Kernel network optimization for Public DNS server
#
# Target:     Azure B2ast (2 vCPU / 1 GB RAM), Ubuntu 22.04/24.04 LTS
# Compliance: CIS Benchmarks (Ubuntu) · PCI-DSS v4.0
#
# Apply with:
#   sudo cp config/99-dns-optimize.conf /etc/sysctl.d/99-dns-optimize.conf
#   sudo sysctl -p /etc/sysctl.d/99-dns-optimize.conf
# =============================================================================

# -----------------------------------------------------------------------------
# TCP Congestion Control — BBR
# Reduces latency and improves throughput on lossy cross-border links
# (China–Japan routes often experience 2-5% packet loss)
# Requires Linux kernel 4.9+ (Ubuntu 22.04 uses kernel 5.15)
# -----------------------------------------------------------------------------
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# -----------------------------------------------------------------------------
# Socket buffer sizes — DNS performance under burst load
# Larger UDP buffers prevent packet drops when many DNS queries arrive at once.
# Increase rmem_max/wmem_max to 4 MB to match Unbound's so-rcvbuf/so-sndbuf.
# Note: Keep these moderate on a 1 GB RAM server to avoid exhausting memory.
# -----------------------------------------------------------------------------
net.core.rmem_max = 4194304
net.core.wmem_max = 4194304
net.core.rmem_default = 262144
net.core.wmem_default = 262144

# UDP-specific buffer (DNS is primarily UDP)
net.ipv4.udp_mem = 65536 131072 262144

# TCP buffer sizes (for DoT connections)
net.ipv4.tcp_rmem = 4096 87380 4194304
net.ipv4.tcp_wmem = 4096 65536 4194304

# Increase the maximum backlog of pending connections
net.core.somaxconn = 1024
net.core.netdev_max_backlog = 5000

# -----------------------------------------------------------------------------
# SYN Flood protection (CIS Benchmark 3.3.2 / PCI-DSS Req. 1)
# -----------------------------------------------------------------------------
net.ipv4.tcp_syncookies = 1

# Reduce TIME_WAIT state duration and allow reuse
net.ipv4.tcp_fin_timeout = 15
net.ipv4.tcp_tw_reuse = 1

# -----------------------------------------------------------------------------
# IP forwarding — DISABLED (PCI-DSS Req. 1)
# This VM is a DNS resolver, not a router. Forwarding creates an attack vector.
# -----------------------------------------------------------------------------
net.ipv4.ip_forward = 0
net.ipv6.conf.all.forwarding = 0

# -----------------------------------------------------------------------------
# ICMP hardening (CIS 3.3.1)
# Reject ICMP redirects that could alter routing tables
# -----------------------------------------------------------------------------
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# Log packets with impossible source addresses (martian packets)
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# Ignore ICMP broadcast requests (Smurf attack mitigation)
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Ignore bogus ICMP error responses
net.ipv4.icmp_ignore_bogus_error_responses = 1

# -----------------------------------------------------------------------------
# IPv6 — disabled if not required
# Reduces attack surface; re-enable if your Unbound config uses IPv6
# (CIS 3.1.1 — disable unused protocols)
# -----------------------------------------------------------------------------
net.ipv6.conf.all.disable_ipv6 = 1
net.ipv6.conf.default.disable_ipv6 = 1
net.ipv6.conf.lo.disable_ipv6 = 1

# -----------------------------------------------------------------------------
# Connection tracking — tuned for DNS workload
# DNS generates many short-lived UDP flows; increase conntrack table size
# to avoid "nf_conntrack: table full" errors under high query load.
# Keeping the limit moderate to respect the 1 GB RAM budget.
#
# Note: These settings require the nf_conntrack kernel module to be loaded.
# If this module is not loaded (e.g., on minimal installs), load it first with:
#   modprobe nf_conntrack
# Or add "nf_conntrack" to /etc/modules for automatic loading at boot.
# If UFW is enabled (as set by deploy.sh), nf_conntrack is loaded automatically.
# -----------------------------------------------------------------------------
net.netfilter.nf_conntrack_max = 131072
net.netfilter.nf_conntrack_udp_timeout = 30
net.netfilter.nf_conntrack_udp_timeout_stream = 60

# -----------------------------------------------------------------------------
# Virtual memory — prevent OOM on 1 GB RAM (PCI-DSS reliability)
# vm.swappiness=10: prefer RAM; only use swap under pressure
# vm.overcommit_memory=1: allow Unbound to pre-allocate cache buffers
# -----------------------------------------------------------------------------
vm.swappiness = 10
vm.overcommit_memory = 1
