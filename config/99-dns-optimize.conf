# =============================================================================
# 99-dns-optimize.conf — 公共DNS服务器的内核网络优化配置
#
# 目标机器：Azure B2ast（2 vCPU / 1 GB RAM），Ubuntu 22.04/24.04 LTS
# 合规标准：CIS 基准（Ubuntu）· PCI-DSS v4.0
#
# 部署方法：
#   sudo cp config/99-dns-optimize.conf /etc/sysctl.d/99-dns-optimize.conf
#   sudo sysctl --system
#
# 重要：底部的 nf_conntrack 设置要求 nf_conntrack 内核模块在应用前已加载
#（UFW 启用时会自动加载该模块）。
# deploy.sh 确保正确的执行顺序：先启用 UFW → 再应用 sysctl。
# =============================================================================

# -----------------------------------------------------------------------------
# TCP 拥塞控制 — BBR
# 降低有丢包跨境链路上的延迟并提高吞吐量。
# 中日线路通常有 1–5% 的丢包率和 50–100 ms 的往返时延。
# BBR 在 Linux 内核 ≥ 4.9 上可用（Ubuntu 22.04 搭载内核 5.15）。
# -----------------------------------------------------------------------------
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# -----------------------------------------------------------------------------
# 套接字缓冲区大小 — 在突发负载下维持 DNS 性能
# 较大的 UDP 缓冲区可防止大量查询同时到达时的丢包。
# 数值与 Unbound 的 so-rcvbuf / so-sndbuf 设置（4 MB）一致。
# 保持适中以遵守 1 GB RAM 预算。
# -----------------------------------------------------------------------------
net.core.rmem_max = 4194304
net.core.wmem_max = 4194304
net.core.rmem_default = 262144
net.core.wmem_default = 262144

# UDP 缓冲区（DNS 主要使用 UDP）
net.ipv4.udp_mem = 65536 131072 262144

# TCP 缓冲区（用于 DNS over TLS 连接）
net.ipv4.tcp_rmem = 4096 87380 4194304
net.ipv4.tcp_wmem = 4096 65536 4194304

# 最大套接字连接积压队列
net.core.somaxconn = 1024
net.core.netdev_max_backlog = 5000

# -----------------------------------------------------------------------------
# SYN 洪水防护 — CIS 基准 3.3.2 / PCI-DSS 要求1
# -----------------------------------------------------------------------------
net.ipv4.tcp_syncookies = 1

# 缩短 TIME_WAIT 持续时间；允许安全地复用出站连接
net.ipv4.tcp_fin_timeout = 15
net.ipv4.tcp_tw_reuse = 1

# -----------------------------------------------------------------------------
# IP 转发 — 已禁用 · PCI-DSS 要求1
# 本虚拟机仅作为 DNS 解析器；开启转发会使其成为路由器攻击入口。
# -----------------------------------------------------------------------------
net.ipv4.ip_forward = 0
net.ipv6.conf.all.forwarding = 0

# -----------------------------------------------------------------------------
# ICMP 加固 — CIS 3.3.1
# 拒绝可能修改内核路由表的重定向报文。
# -----------------------------------------------------------------------------
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# 记录来源地址不合法（Martian）的数据包
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# 忽略 ICMP 广播 ping（防止 Smurf 放大攻击）
net.ipv4.icmp_echo_ignore_broadcasts = 1

# 丢弃伪造的 ICMP 错误响应
net.ipv4.icmp_ignore_bogus_error_responses = 1

# -----------------------------------------------------------------------------
# IPv6 — 已禁用（缩小攻击面 · CIS 3.1.1）
# 如需 IPv6 客户端或上游转发器，请重新启用。
# -----------------------------------------------------------------------------
net.ipv6.conf.all.disable_ipv6 = 1
net.ipv6.conf.default.disable_ipv6 = 1
net.ipv6.conf.lo.disable_ipv6 = 1

# -----------------------------------------------------------------------------
# 连接跟踪 — 针对大量短暂 DNS UDP 流调优
# DNS 会产生大量短暂 UDP 会话；conntrack 表过小会导致
# 高负载时出现"nf_conntrack: table full, dropping packet"错误。
#
# 前提条件：应用这些设置之前，nf_conntrack 模块必须已加载。
# deploy.sh 先启用 UFW（会加载 nf_conntrack），再调用 `sysctl --system`。
# 请勿在 UFW 启用前手动应用这些设置。
# 手动加载模块：modprobe nf_conntrack
# 持久化加载：  echo "nf_conntrack" >> /etc/modules
# -----------------------------------------------------------------------------
net.netfilter.nf_conntrack_max = 131072
net.netfilter.nf_conntrack_udp_timeout = 30
net.netfilter.nf_conntrack_udp_timeout_stream = 60

# -----------------------------------------------------------------------------
# 虚拟内存 — 防止 1 GB RAM 内存溢出 · PCI-DSS 可用性要求
# swappiness=10        : 强烈优先使用 RAM；仅在真正内存压力下才使用交换空间
# overcommit_memory=0  : 启发式模式（操作系统默认）；拒绝明显会耗尽可用内存的
#                        分配请求 — 在内存受限主机上比设为 1 更安全
# -----------------------------------------------------------------------------
vm.swappiness = 10
vm.overcommit_memory = 0
