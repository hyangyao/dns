# =============================================================================
# unbound-enterprise.conf — 企业级 Unbound 配置
#
# 目标机器：Azure B2ast（2 vCPU / 1 GB RAM）— 日本东部区域
# 客户端：中国青岛（跨境高延迟、丢包及 GFW 干扰对抗）
# 合规标准：CIS DNS 基准 · PCI-DSS v4.0
# 操作系统：Ubuntu 22.04 / 24.04 LTS（Unbound ≥ 1.13）
#
# 核心设计原则：
#   1. 内存严格受控（总缓存 ≤ 192 MB，防止 1 GB 主机 OOM）
#   2. 对抗跨境链路：通过 DoT 转发上游查询，防止 GFW DNS 污染
#   3. 高并发低延迟：so-reuseport + serve-expired + prefetch
#   4. 防放大攻击：速率限制 + ACL 白名单 + minimal-responses
#   5. 合规加固：隐藏身份/版本、QNAME 最小化、DNSSEC 强化
#
# 部署方法：
#   sudo cp config/unbound-enterprise.conf /etc/unbound/unbound.conf
#   sudo unbound-checkconf /etc/unbound/unbound.conf
#   sudo systemctl reload unbound
# =============================================================================

server:
    # -------------------------------------------------------------------------
    # 监听接口与端口
    # -------------------------------------------------------------------------

    # 在所有 IPv4 接口监听标准 DNS 端口
    interface: 0.0.0.0
    port: 53

    # DoT 服务端（853 端口）— 运行 scripts/setup-tls.sh 后取消注释
    # interface: 0.0.0.0@853

    # 禁用 IPv6（与 sysctl net.ipv6.conf.all.disable_ipv6=1 保持一致）
    do-ip4: yes
    do-ip6: no
    do-udp: yes
    do-tcp: yes

    # -------------------------------------------------------------------------
    # 访问控制 — 防 DNS 放大攻击 · PCI-DSS 要求1
    #
    # 默认策略：拒绝所有入站查询。
    # 仅将明确授权的 IP 或子网加入白名单。
    # 若本服务器作为公共开放 DNS（0.0.0.0/0 allow），必须同时确保
    # ratelimit 和 ip-ratelimit 生效以防止被滥用于放大攻击。
    # -------------------------------------------------------------------------

    access-control: 0.0.0.0/0 refuse
    access-control: 127.0.0.0/8 allow

    # 在此添加授权客户端 — 请替换为实际 IP 或子网：
    # access-control: <青岛客户端IP>/32 allow
    # access-control: <青岛子网>/24    allow

    # -------------------------------------------------------------------------
    # 内存分配 — 严格控制于 1 GB RAM（防止 OOM）
    #
    # 【数学推导】
    # 1 GB = 1024 MB 总物理内存
    # 内存消耗分解：
    #   操作系统内核 + 系统服务 ≈ 256–300 MB
    #   Unbound 线程栈（2线程 × 8MB）≈ 16 MB
    #   fail2ban + auditd + sshd ≈ 50 MB
    #   可用于 Unbound 缓存的预算 ≈ 1024 - 300 - 16 - 50 = 658 MB
    #   保守缓存上限（留 400+ MB 安全余量）≈ 192 MB（占总 RAM 的 18.75%）
    #
    # 缓存内部分配比例（基于 Unbound 文档最佳实践）：
    #   RRset 缓存存储实际 DNS 资源记录（数据更大）→ 192 × 2/3 ≈ 128 MB
    #   消息缓存存储完整响应元数据（引用 RRset）→ 192 × 1/3 ≈  64 MB
    #   规律：msg-cache 大约为 rrset-cache 的一半，
    #         因为每条 msg-cache 条目会引用多个 rrset-cache 条目。
    #   DNSSEC 密钥缓存                           →              16 MB
    #   合计：64 + 128 + 16 = 208 MB（含安全余量仍在 1 GB 的 20% 以内）
    # -------------------------------------------------------------------------

    msg-cache-size:   64m
    rrset-cache-size: 128m
    key-cache-size:   16m

    # 基础架构缓存（跟踪权威服务器 RTT 和故障状态，内存占用极小）
    infra-cache-numhosts: 10000

    # -------------------------------------------------------------------------
    # CPU 线程与缓存分片 — 2 个 vCPU
    #
    # num-threads 设为物理核心数，避免线程争用导致上下文切换开销。
    # *-cache-slabs 必须是 2 的幂次且 >= num-threads；
    # 分片将缓存哈希表分区，大幅减少多线程锁竞争（mutex contention）。
    # 对于 2 核：slabs=2 是最优值（slabs=4 同样有效但收益边际递减）。
    # -------------------------------------------------------------------------

    num-threads: 2
    msg-cache-slabs:   2
    rrset-cache-slabs: 2
    infra-cache-slabs: 2
    key-cache-slabs:   2

    # -------------------------------------------------------------------------
    # 高并发网络性能
    #
    # so-reuseport: 允许多个线程共享同一 UDP/TCP 端口，由内核负载均衡分发，
    #               消除单套接字接收瓶颈，是多线程 DNS 服务器的关键优化。
    #
    # edns-buffer-size: 1232 字节。
    #   RFC 6891 推荐最大为 4096，但实际中国-日本跨境链路上，
    #   超过 1232 字节的 UDP 数据报常因路径 MTU 不一致而被分片或丢弃。
    #   1232 = IPv6 最小 MTU（1280） - IPv6头（40） - UDP头（8）。
    #   使用此值可在 IPv4/IPv6 双栈路径上均避免 IP 分片。
    #
    # outgoing-range: 每线程可同时持有的出站 UDP 套接字数量上限。
    #   8192 × 2线程 = 最多 16384 个并发上游查询（需 LimitNOFILE ≥ 65535）。
    #
    # num-queries-per-thread: 每线程入站查询队列深度。
    #   4096 可承受突发流量峰值而不丢弃入站查询。
    # -------------------------------------------------------------------------

    so-reuseport: yes
    edns-buffer-size: 1232

    outgoing-range: 8192
    num-queries-per-thread: 4096

    # 套接字接收/发送缓冲区 — 与 sysctl rmem_max/wmem_max（8 MB）匹配
    so-rcvbuf: 8m
    so-sndbuf: 8m

    # -------------------------------------------------------------------------
    # 跨境链路韧性 — 关键延迟对抗策略
    #
    # serve-expired: 当上游权威服务器超时或不可达时，
    #   返回已过期的缓存记录（而非 SERVFAIL）。
    #   对于中日跨境链路尤为关键——GFW 干扰或跨境拥塞会导致上游间歇性不可达。
    #   每次延迟响应（SERVFAIL）对客户端感知延迟影响巨大；
    #   提供过期记录（stale-serve）可将"感知故障"转化为"轻微数据陈旧"。
    #
    # serve-expired-ttl: 86400（24小时）
    #   过期记录最长可服务 24 小时。此值针对跨境场景调大：
    #   对于中国互联网高度依赖的 CDN 域名（如百度、腾讯、阿里云），
    #   记录变更频率远低于跨境链路故障频率，24 小时过期容忍度合理。
    #
    # prefetch: 在热门记录 TTL 剩余 10% 时提前刷新，避免缓存命中中断。
    #
    # minimal-responses: 仅返回 DNS 查询所需的最少记录（无附加节），
    #   减少响应包大小，降低跨境链路丢包概率，同时防止信息泄露。
    # -------------------------------------------------------------------------

    serve-expired: yes
    serve-expired-ttl: 86400

    prefetch: yes
    prefetch-key: yes

    minimal-responses: yes

    # TTL 边界 — 防止过短 TTL 导致缓存穿透攻击，防止过长 TTL 导致陈旧污染
    cache-min-ttl: 60
    cache-max-ttl: 86400

    # -------------------------------------------------------------------------
    # DNSSEC 信任锚与根提示
    # -------------------------------------------------------------------------

    auto-trust-anchor-file: "/var/lib/unbound/root.key"
    root-hints: "/var/lib/unbound/root.hints"

    # -------------------------------------------------------------------------
    # DoT 服务端 TLS 配置占位符
    # 运行 scripts/setup-tls.sh <域名> <邮箱> 后激活
    # -------------------------------------------------------------------------

    # tls-service-key: "/etc/letsencrypt/live/您的域名/privkey.pem"
    # tls-service-pem: "/etc/letsencrypt/live/您的域名/fullchain.pem"
    # tls-min-version: "TLSv1.2"

    # -------------------------------------------------------------------------
    # 隐私与安全加固
    # CIS DNS 基准 2.x · PCI-DSS 要求2（消除供应商默认配置）
    # -------------------------------------------------------------------------

    # 隐藏服务器软件身份 — 防止指纹识别（CIS DNS 2.1）
    hide-identity: yes
    hide-version: yes
    hide-trustanchor: yes

    # QNAME 最小化 — RFC 7816；只向各层 NS 发送查询所需的最少域名信息
    qname-minimisation: yes

    # 0x20 随机大小写 — Kaminsky 攻击变种缓解（混淆大小写使欺骗更难）
    use-caps-for-id: yes

    # DNSSEC 加固
    harden-glue: yes                    # 拒绝非权威的胶水记录
    harden-dnssec-stripped: yes         # 拒绝已剥除 DNSSEC 签名的响应
    harden-below-nxdomain: yes          # RFC 8020：截断 NXDOMAIN 子域名
    harden-algo-downgrade: yes          # 拒绝算法降级攻击

    # 注意：harden-referral-path 有意不启用。
    # 大量合法域名（CDN、云厂商）的 NS 委派路径未签名，启用后误报率极高。

    # 反欺骗检测：收到异常响应时记录并触发告警（不是 DNSSEC 失败时也适用）
    unwanted-reply-threshold: 10000

    # -------------------------------------------------------------------------
    # 速率限制 — PCI-DSS 要求6（防 DNS 放大攻击）
    #
    # ratelimit: 每个权威区每秒最多可递归查询次数。超过后返回 REFUSED。
    #   1000 QPS/区：足以应对正常递归负载，同时有效抑制放大攻击。
    #
    # ip-ratelimit: 每个来源 IP 每秒最多查询次数。
    #   100 QPS/IP：允许合理的客户端查询，限制扫描和 DDoS 来源。
    # -------------------------------------------------------------------------

    ratelimit: 1000
    ip-ratelimit: 100

    # -------------------------------------------------------------------------
    # 日志 — PCI-DSS 要求10（审计所有 DNS 基础设施访问）
    # -------------------------------------------------------------------------

    use-syslog: yes
    verbosity: 1
    log-queries: yes
    log-replies: yes
    log-servfail: yes

    # -------------------------------------------------------------------------
    # 本地区域 — 防止内部域名泄漏到上游
    # -------------------------------------------------------------------------

    local-zone: "localhost." static
    local-data: "localhost. 10800 IN A 127.0.0.1"
    local-zone: "127.in-addr.arpa." static
    local-data: "1.0.0.127.in-addr.arpa. 10800 IN PTR localhost."

# =============================================================================
# 上游转发区（DoT — DNS over TLS 转发）
#
# 【跨境设计思路】
# 标准 DNS（UDP 53 端口）在中国大陆至境外链路上极易被 GFW 污染（DNS 注入）。
# 通过将所有递归查询转发至境外知名 DoT 服务器，可实现：
#   1. 端到端 TLS 加密——GFW 无法在 TLS 会话内注入伪造响应
#   2. 明文 UDP 53 仅对本地局域网/回环暴露（上游全走 853 TLS）
#   3. 若需完全递归（不转发），注释掉以下 forward-zone 并依赖根提示
#
# 注意：使用转发模式后，Unbound 本身不再从根服务器递归，
# 而是将查询加密转发给 forward-addr 列出的服务器。
# DNSSEC 验证仍由本地 Unbound 执行。
# =============================================================================

forward-zone:
    name: "."

    # Cloudflare DNS over TLS（1.1.1.1 / 1.0.0.1）
    forward-addr: 1.1.1.1@853#cloudflare-dns.com
    forward-addr: 1.0.0.1@853#cloudflare-dns.com

    # Google DNS over TLS（8.8.8.8 / 8.8.4.4）
    forward-addr: 8.8.8.8@853#dns.google
    forward-addr: 8.8.4.4@853#dns.google

    # 强制上游使用 TLS（不降级到明文 UDP/TCP）
    forward-tls-upstream: yes

# =============================================================================
# 远程控制 — Unix 域套接字（无需 TLS 密钥文件）
# 使用：sudo unbound-control stats_noreset
#       sudo unbound-control reload
#       sudo unbound-control flush_zone example.com
# =============================================================================

remote-control:
    control-enable: yes
    control-interface: /run/unbound.ctl
