# =============================================================================
# 99-dns-extreme-network.conf — 极致性能网络内核优化配置
#
# 目标机器：Azure B2ast（2 vCPU / 1 GB RAM），Ubuntu 22.04/24.04 LTS
# 客户端：中国青岛（跨境高延迟 50–100ms RTT，1–5% 丢包率）
# 合规标准：CIS 基准（Ubuntu）· PCI-DSS v4.0
#
# 部署方法：
#   sudo cp config/99-dns-extreme-network.conf \
#           /etc/sysctl.d/99-dns-extreme-network.conf
#   sudo sysctl --system
#
# 注意：net.netfilter.nf_conntrack_* 参数要求 nf_conntrack 内核模块已加载。
# deploy-ha-dns.sh 保证执行顺序：先启用 UFW（会加载 nf_conntrack）→ 再应用 sysctl。
# =============================================================================

# -----------------------------------------------------------------------------
# 跨境路由优化 — BBR 拥塞控制
#
# 【为何选择 BBR？】
# 传统 CUBIC 算法将"丢包"视为拥塞信号并削减发送速率（乘法减小因子 = 0.7）。
# 中日跨境链路特征：RTT ≈ 50–100ms，随机丢包率 1–5%（非拥塞性丢包）。
#
# CUBIC 稳态带宽公式：B = C × MSS / (RTT × √p)
#   代入：p=1%=0.01，√p=0.1，RTT=75ms，C≈1.22，MSS=1460B
#   B ≈ 1.22 × 1460 / (0.075 × 0.1) ≈ 237 KB/s ≈ 1.9 Mbps（严重不足）
#
# BBR（Bottleneck Bandwidth and RTT）不依赖丢包，而是估算链路真实带宽
# 和最小 RTT，在相同条件下实测吞吐量比 CUBIC 高 3–30 倍。
#
# fq（Fair Queueing）是 BBR 必配的队列调度器：
#   - 为每个流提供独立的发送队列，防止大流饥饿小流
#   - 提供精确的发送时间戳，BBR 依此估算 BtlBW（瓶颈带宽）
# -----------------------------------------------------------------------------
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# -----------------------------------------------------------------------------
# TCP Fast Open（TFO）— 为 DoT（TCP 853）和 DNS over TCP 减少握手 RTT
#
# 标准 TCP 三次握手需要 1 个 RTT 才能开始传数据。
# 对于青岛-日本链路（RTT ≈ 70ms），TFO 将首字节时间（TTFB）减少约 70ms。
#
# 值说明：
#   0 = 禁用（默认）
#   1 = 仅客户端
#   2 = 仅服务端
#   3 = 同时对客户端和服务端启用（推荐）
# -----------------------------------------------------------------------------
net.ipv4.tcp_fastopen = 3

# -----------------------------------------------------------------------------
# UDP / TCP 高负载缓冲区 — 防止 DNS 突发流量丢包
#
# 【带宽时延积（BDP）计算】
# BDP = 带宽 × RTT = 1000 Mbps × 0.1s = 12,500,000 字节 ≈ 12 MB
# 缓冲区须 ≥ BDP 才不会成为瓶颈，16MB 提供充足余量。
#
# DNS 负载特征：
#   - 大量小 UDP 数据报（< 512 字节/查询）突发到达
#   - 16MB 接收缓冲区可在无损情况下缓存约 32000 个并发 DNS 请求
#   - 与 Unbound 的 so-rcvbuf / so-sndbuf 配置匹配
# -----------------------------------------------------------------------------
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.core.rmem_default = 262144
net.core.wmem_default = 262144

# UDP 内存最小保留量（防止低内存时 UDP 接收/发送缓冲区被完全收缩）
net.ipv4.udp_rmem_min = 131072
net.ipv4.udp_wmem_min = 131072

# UDP 总内存限制（页为单位，每页 4096 字节）
# 三个值：最小 / 压力阈值 / 最大（均为页数）
# 推导：16MB UDP 缓冲区 / 4096 字节/页 = 4096 页
#   min:      4096 页 = 16MB（保留最小 UDP 内存）
#   pressure: 8192 页 = 32MB（超过此值时内核开始回收）
#   max:     16384 页 = 64MB（允许突发时超过 rmem_max 的峰值需求）
net.ipv4.udp_mem = 4096 8192 16384

# TCP 缓冲区（用于 DoT 长连接，自动调优范围）
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# -----------------------------------------------------------------------------
# 高负载连接队列 — 防止突发连接丢弃
#
# netdev_max_backlog: NIC 接收队列深度，防止软中断处理前丢包
# tcp_max_syn_backlog: SYN 半连接队列深度，与 tcp_syncookies 配合防 SYN Flood
# somaxconn: 全连接（accept）队列上限，支持 DoT 连接突发
# -----------------------------------------------------------------------------
net.core.netdev_max_backlog = 10000
net.ipv4.tcp_max_syn_backlog = 8192
net.core.somaxconn = 4096

# -----------------------------------------------------------------------------
# CIS / PCI-DSS 安全加固
#
# 【SYN Flood 防护 — CIS 3.3.2 / PCI-DSS 要求1】
# tcp_syncookies: 在 SYN 队列满时使用 SYN Cookie 验证客户端合法性，
#   无需占用 SYN 队列槽位，彻底防御 SYN Flood 攻击。
# tcp_max_syn_backlog: 8192（见上方）
# -----------------------------------------------------------------------------
net.ipv4.tcp_syncookies = 1

# TCP 连接回收优化（加快 DoT 连接复用）
net.ipv4.tcp_fin_timeout = 15
net.ipv4.tcp_tw_reuse = 1

# -----------------------------------------------------------------------------
# IP 转发 — 禁用 · PCI-DSS 要求1
# 本服务器仅作为 DNS 解析器，开启转发将使其成为路由器攻击入口。
# -----------------------------------------------------------------------------
net.ipv4.ip_forward = 0
net.ipv6.conf.all.forwarding = 0

# -----------------------------------------------------------------------------
# ICMP 加固与路由安全 — CIS 3.3.1 / PCI-DSS 要求1
#
# accept_redirects = 0
#   拒绝接收 ICMP 路由重定向报文（可修改内核路由表，是中间人攻击入口）。
#
# send_redirects = 0
#   不向其他主机发送 ICMP 重定向（防止本机被用作中间人跳板）。
#
# rp_filter = 1（严格反向路径过滤）
#   若数据包的源地址与接收接口的最佳路由不一致，则丢弃该包。
#   防止 IP 欺骗和非对称路由攻击（CIS 3.3.7 / PCI-DSS 要求1）。
#
# accept_source_route = 0
#   禁用 IP 源路由选项（攻击者可借此绕过防火墙指定数据包路径）。
# -----------------------------------------------------------------------------
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0

# 记录来源地址不合法（Martian）的数据包（CIS 3.3.9）
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# 忽略 ICMP 广播 ping（防止 Smurf 放大攻击）
net.ipv4.icmp_echo_ignore_broadcasts = 1

# 丢弃伪造的 ICMP 错误响应
net.ipv4.icmp_ignore_bogus_error_responses = 1

# -----------------------------------------------------------------------------
# IPv6 — 全面禁用（缩小攻击面 · CIS 3.1.1）
#
# 本部署不使用 IPv6（客户端和上游均为 IPv4）。
# 禁用 IPv6 减少内核网络栈的攻击面，符合 CIS 最小化原则。
# 若需支持 IPv6 客户端或上游转发器，将以下值改为 0 并在 Unbound 中启用 do-ip6。
# -----------------------------------------------------------------------------
net.ipv6.conf.all.disable_ipv6 = 1
net.ipv6.conf.default.disable_ipv6 = 1
net.ipv6.conf.lo.disable_ipv6 = 1

# -----------------------------------------------------------------------------
# 连接跟踪 — 针对大量短暂 DNS UDP 流调优
#
# DNS 产生大量短暂 UDP 会话（每次查询约 0.1–2 秒），快速填满 conntrack 表。
# nf_conntrack_max = 131072（128K 条目），承受约 65K 并发 DNS 会话。
# 缩短 UDP 超时（30/60 秒）加速条目回收，防止"nf_conntrack: table full"丢包。
#
# 前提：nf_conntrack 模块须已由 UFW 加载（deploy-ha-dns.sh 保证顺序）。
# -----------------------------------------------------------------------------
net.netfilter.nf_conntrack_max = 131072
net.netfilter.nf_conntrack_udp_timeout = 30
net.netfilter.nf_conntrack_udp_timeout_stream = 60
net.netfilter.nf_conntrack_tcp_timeout_established = 600

# -----------------------------------------------------------------------------
# 虚拟内存 — 防止 1 GB RAM OOM · PCI-DSS 可用性要求
#
# swappiness = 10     : 强烈偏好使用物理 RAM，仅在真正内存压力下才触发交换
# overcommit_memory=0 : 启发式模式，拒绝明显超出可用内存的分配请求
#                       （比设为 1 更安全，在内存受限主机上防止 OOM Kill 风暴）
# -----------------------------------------------------------------------------
vm.swappiness = 10
vm.overcommit_memory = 0
