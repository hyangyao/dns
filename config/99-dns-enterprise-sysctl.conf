# =============================================================================
# 99-dns-enterprise-sysctl.conf — 企业级公共 DNS 服务器内核优化配置
#
# 目标机器：Azure B2ast（2 vCPU / 1 GB RAM），Ubuntu 22.04/24.04 LTS
# 客户端：中国青岛（跨境高延迟链路优化）
# 合规标准：CIS 基准（Ubuntu）· PCI-DSS v4.0
#
# 部署方法：
#   sudo cp config/99-dns-enterprise-sysctl.conf \
#           /etc/sysctl.d/99-dns-enterprise-sysctl.conf
#   sudo sysctl --system
#
# 重要：nf_conntrack 参数要求同名内核模块已加载。
# enterprise_deploy.sh 保证执行顺序：先启用 UFW → 再应用 sysctl。
# =============================================================================

# -----------------------------------------------------------------------------
# TCP 拥塞控制 — BBR（Bottleneck Bandwidth and Round-trip time）
#
# 【数学原理】
# 传统 CUBIC 算法在有丢包时将拥塞窗口削减至原来的 70%（乘法减小）。
# 中日跨境链路典型参数：
#   RTT（往返时延）= 50–100 ms
#   丢包率         = 1–5%（非拥塞性随机丢包）
# CUBIC 在 1% 丢包下的稳态带宽 ≈ C × MSS / (RTT × √丢包率)
#   代入数值：丢包率 = 1% = 0.01，√0.01 = 0.1；RTT = 75ms = 0.075s
#                                ≈ 1.22 × 1460 / (0.075 × 0.1) ≈ 237 KB/s ≈ 1.9 Mbps
# BBR 不依赖丢包作为拥塞信号，而是估算"真实可用带宽"并用 BtlBW 驱动发送速率。
# 在 1% 丢包 + 100ms RTT 链路上，BBR 实测吞吐量比 CUBIC 高 3–30 倍。
#
# fq（Fair Queueing）是 BBR 必需的配套队列调度器：
# BBR 需要精确的时间戳来估算 RTT，FQ 保证每个流独立出队，防止大流饥饿小流。
# -----------------------------------------------------------------------------
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# -----------------------------------------------------------------------------
# TCP Fast Open（TFO）— 为 DoT（TCP 853）节省一个 RTT 握手时延
#
# 标准 TCP 三次握手需要 1 个 RTT 才能开始传数据。
# 对于青岛-日本链路（RTT ≈ 70ms），TFO 可将首字节时间（TTFB）减少 70ms。
# 值 3 = 同时对客户端（1）和服务端（2）启用 TFO。
# -----------------------------------------------------------------------------
net.ipv4.tcp_fastopen = 3

# -----------------------------------------------------------------------------
# 套接字缓冲区大小 — 匹配青岛-日本链路带宽时延积（BDP）
#
# 【带宽时延积计算】
# BDP = 带宽 × RTT = 100 Mbps × 0.1 s = 10,000,000 bits = 1,250,000 bytes ≈ 1.2 MB
# 为防止缓冲区成为瓶颈，max 缓冲区须 ≥ BDP。
# 设为 8 MB（8,388,608 字节）提供充足余量，同时与 Unbound so-rcvbuf/so-sndbuf 一致。
#
# DNS 负载特征：
# - 大量短暂 UDP 数据报（典型 DNS 响应 < 512 字节）
# - 突发峰值（查询集中到达）时需要足够的接收队列深度
# - 8 MB 缓冲区可在突发 1 万次查询（每个约 100 字节）时无损缓存
# -----------------------------------------------------------------------------
net.core.rmem_max = 8388608
net.core.wmem_max = 8388608
net.core.rmem_default = 262144
net.core.wmem_default = 262144

# UDP 内存限制（页为单位，每页 4096 字节）
# 三个值：最小 / 压力阈值 / 最大
# 最大 = 8388608 字节 / 4096 = 2048 页（略低于 rmem_max 以防系统整体 OOM）
net.ipv4.udp_mem = 65536 131072 2097152

# TCP 缓冲区（用于 DoT 长连接）
net.ipv4.tcp_rmem = 4096 87380 8388608
net.ipv4.tcp_wmem = 4096 65536 8388608

# 最大 TCP 监听队列（防止突发连接丢弃）
net.core.somaxconn = 4096

# NIC 接收队列深度（防止软中断处理前丢包）
net.core.netdev_max_backlog = 5000

# -----------------------------------------------------------------------------
# SYN 洪水防护 — CIS 基准 3.3.2 / PCI-DSS 要求1
# -----------------------------------------------------------------------------
net.ipv4.tcp_syncookies = 1

# 缩短 FIN_WAIT/TIME_WAIT，加快 DNS over TCP 连接回收
net.ipv4.tcp_fin_timeout = 15
net.ipv4.tcp_tw_reuse = 1

# -----------------------------------------------------------------------------
# IP 转发 — 已禁用 · PCI-DSS 要求1
# 本服务器角色为 DNS 解析器，开启转发将使其成为网络路由器攻击面。
# -----------------------------------------------------------------------------
net.ipv4.ip_forward = 0
net.ipv6.conf.all.forwarding = 0

# -----------------------------------------------------------------------------
# ICMP 加固与路由安全 — CIS 3.3.1 / PCI-DSS 要求1
#
# accept_redirects=0 : 拒绝 ICMP 重定向报文（可修改内核路由表）
# send_redirects=0   : 不发送 ICMP 重定向（防止本机成为中间人）
# accept_source_route=0 : 禁用源路由（防止攻击者指定数据包路径绕过防火墙）
# rp_filter=1        : 严格模式反向路径过滤（Strict Reverse Path Filtering）
#   — 若数据包的源地址与接收该包的接口最佳路由不一致则丢弃，
#     防止 IP 欺骗和非对称路由攻击（CIS 3.3.7 / PCI-DSS 要求1）。
# -----------------------------------------------------------------------------
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# 记录来源地址不合法（Martian）的数据包（CIS 3.3.9）
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# 忽略 ICMP 广播 ping（防止 Smurf 放大攻击）
net.ipv4.icmp_echo_ignore_broadcasts = 1

# 丢弃伪造的 ICMP 错误响应
net.ipv4.icmp_ignore_bogus_error_responses = 1

# 安全 ICMP 重定向（仅接受受信任网关的重定向）
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0

# -----------------------------------------------------------------------------
# IPv6 — 已全面禁用（缩小攻击面 · CIS 3.1.1）
# 若需支持 IPv6 客户端或 IPv6 上游，请将下列值改回 0 并在 Unbound 中启用 do-ip6
# -----------------------------------------------------------------------------
net.ipv6.conf.all.disable_ipv6 = 1
net.ipv6.conf.default.disable_ipv6 = 1
net.ipv6.conf.lo.disable_ipv6 = 1

# -----------------------------------------------------------------------------
# 连接跟踪 — 针对大量短暂 DNS UDP 流调优
#
# 大量短暂 UDP DNS 查询会快速填满 conntrack 表。
# nf_conntrack_max = 131072（128K 条目）可承受约 65K 并发 DNS 会话。
# 缩短 UDP 超时时间（30/60 秒）加快表项回收，防止"table full"丢包。
#
# 前提：nf_conntrack 模块须已由 UFW 加载（enterprise_deploy.sh 保证顺序）。
# -----------------------------------------------------------------------------
net.netfilter.nf_conntrack_max = 131072
net.netfilter.nf_conntrack_udp_timeout = 30
net.netfilter.nf_conntrack_udp_timeout_stream = 60
net.netfilter.nf_conntrack_tcp_timeout_established = 600

# -----------------------------------------------------------------------------
# 虚拟内存 — 防止 1 GB RAM 内存溢出（OOM） · PCI-DSS 可用性要求
#
# swappiness=10     : 强烈优先使用物理 RAM；仅在真正内存压力下才使用交换
# overcommit_memory=0: 启发式模式——拒绝明显会超出可用内存的分配请求
# -----------------------------------------------------------------------------
vm.swappiness = 10
vm.overcommit_memory = 0
