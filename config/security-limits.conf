# =============================================================================
# security-limits.conf — 企业级 DNS 服务器资源限制配置
#
# 部署位置：/etc/security/limits.d/99-dns-enterprise.conf
#
# 用途：
#   为 unbound 用户提高文件描述符（fd）上限，以支持高并发 DNS 连接。
#
# 【为何需要 65535 个文件描述符】
# Unbound 企业配置中：
#   outgoing-range: 8192（每线程出站 UDP 套接字数）
#   num-threads:    2（线程数）
#   最大出站套接字 = 8192 × 2 = 16384 个 fd（仅用于出站 UDP）
#   加上入站监听套接字、DoT TLS 连接、unbound-control 套接字等：
#   总计可能达到 20000–30000 个文件描述符。
#   设为 65535 提供足够安全余量，同时不超过系统全局上限（fs.file-max）。
#
# 此文件须配合 systemd 服务覆盖（LimitNOFILE=65535）一同使用，
# 因为 systemd 管理的服务会忽略 PAM limits.conf，需通过 drop-in 单独配置。
#
# 部署方法（由 enterprise_deploy.sh 自动完成）：
#   sudo cp config/security-limits.conf \
#           /etc/security/limits.d/99-dns-enterprise.conf
# =============================================================================

# 格式：<用户/组>  <类型>  <项目>   <值>
#        domain    type   item     value

# unbound 服务账户 — 文件描述符限制
unbound  soft  nofile  65535
unbound  hard  nofile  65535

# root 账户（运行 unbound-control 等管理工具时使用）
root     soft  nofile  65535
root     hard  nofile  65535
