# =============================================================================
# unbound.conf — Production-ready Unbound for Azure B2ast (2 vCPU / 1 GB RAM)
#
# Location:   Japan East — optimised for Qingdao, China clients
# Compliance: CIS DNS Benchmark · PCI-DSS v4.0
# OS:         Ubuntu 22.04 / 24.04 LTS (Unbound ≥ 1.13)
#
# DoT (port 853) is DISABLED here until TLS certificates are provisioned.
# Run scripts/setup-tls.sh to enable DoT after certificate issuance.
# =============================================================================

server:
    # -------------------------------------------------------------------------
    # Interfaces & protocol stack
    # -------------------------------------------------------------------------

    # Listen on all IPv4 interfaces for plain DNS
    interface: 0.0.0.0
    port: 53

    # DoT (port 853) — uncomment ONLY after running scripts/setup-tls.sh
    # interface: 0.0.0.0@853

    # Explicitly disable IPv6 to match sysctl (net.ipv6.conf.all.disable_ipv6=1)
    do-ip4: yes
    do-ip6: no

    # -------------------------------------------------------------------------
    # Access control — anti-amplification · PCI-DSS Req. 1
    # Deny all sources by default; whitelist required client IPs below.
    # -------------------------------------------------------------------------

    access-control: 0.0.0.0/0 refuse

    # Allow loopback (required for health checks and unbound-control)
    access-control: 127.0.0.0/8 allow

    # Add your client CIDR here — replace with your actual IP or subnet:
    # access-control: <YOUR_CLIENT_IP>/32 allow
    # access-control: <YOUR_SUBNET>/24  allow

    # -------------------------------------------------------------------------
    # Memory — capped for 1 GB RAM (OOM prevention)
    # Cache budget ≈ 192 MB (~19% of 1 GB):
    #   rrset-cache-size = 128 MB  (stores RRsets, ~67% of budget)
    #   msg-cache-size   =  64 MB  (stores full responses, ~33% of budget)
    #   key-cache-size   =  16 MB  (stores DNSSEC keys)
    # -------------------------------------------------------------------------

    msg-cache-size: 64m
    rrset-cache-size: 128m
    key-cache-size: 16m

    # Infrastructure cache: track RTT and lame servers (keep small)
    infra-cache-numhosts: 10000

    # -------------------------------------------------------------------------
    # Thread & slab tuning — 2 vCPUs
    # -------------------------------------------------------------------------

    # One thread per physical CPU core
    num-threads: 2

    # Slabs must be a power of 2 and >= num-threads; partitions cache to
    # reduce mutex contention between threads
    msg-cache-slabs: 2
    rrset-cache-slabs: 2
    infra-cache-slabs: 2
    key-cache-slabs: 2

    # -------------------------------------------------------------------------
    # Network performance
    # -------------------------------------------------------------------------

    # 400 outgoing ports × 2 threads = 800 concurrent upstream queries;
    # balances concurrency with the 1 GB RAM memory budget
    outgoing-range: 400

    # Socket buffers — sized to match sysctl rmem_max/wmem_max (4 MB)
    so-rcvbuf: 4m
    so-sndbuf: 4m

    # Incoming query queue depth per thread
    num-queries-per-thread: 1024

    # -------------------------------------------------------------------------
    # DoT — DNS over TLS configuration placeholders
    # These lines are INACTIVE until interface: 0.0.0.0@853 is uncommented.
    # Enable by running: sudo bash scripts/setup-tls.sh <domain> <email>
    # -------------------------------------------------------------------------

    # tls-service-key: "/etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem"
    # tls-service-pem: "/etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem"
    # tls-min-version: "TLSv1.2"

    # -------------------------------------------------------------------------
    # Privacy & security hardening
    # CIS DNS Benchmark 2.x · PCI-DSS Req. 2 (eliminate vendor defaults)
    # -------------------------------------------------------------------------

    # Hide server software identity — prevents fingerprinting (CIS DNS 2.1)
    hide-identity: yes
    hide-version: yes

    # QNAME minimisation — RFC 7816; send minimal upstream queries for privacy
    qname-minimisation: yes

    # 0x20 random-case spoofing detection (Kaminsky-variant mitigation)
    use-caps-for-id: yes

    # DNSSEC hardening
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-below-nxdomain: yes
    harden-algo-downgrade: yes

    # NOTE: harden-referral-path is intentionally omitted; enabling it can
    # produce false DNSSEC failures on legitimate domains whose NS referral
    # paths are unsigned (common with large CDNs and cloud providers).

    # TTL bounds — mitigate negative-caching attacks and stale poison
    cache-min-ttl: 60
    cache-max-ttl: 86400

    # DNSSEC trust anchor — initialised by unbound-anchor in deploy.sh
    auto-trust-anchor-file: "/var/lib/unbound/root.key"

    # Root hints — updated by deploy.sh on first run
    root-hints: "/var/lib/unbound/root.hints"

    # -------------------------------------------------------------------------
    # Performance & prefetching
    # -------------------------------------------------------------------------

    # Refresh popular records before TTL expiry to reduce cache misses
    prefetch: yes
    prefetch-key: yes

    # Serve stale records during upstream unavailability (1 h tolerance).
    # Especially useful when China–Japan links are intermittently unreachable.
    serve-expired: yes
    serve-expired-ttl: 3600

    # -------------------------------------------------------------------------
    # Rate limiting — PCI-DSS Req. 6 (anti-DNS amplification)
    # -------------------------------------------------------------------------

    # Per-authoritative-zone QPS limit; REFUSED when exceeded
    ratelimit: 1000

    # Per-client-IP query rate limit
    ip-ratelimit: 100

    # -------------------------------------------------------------------------
    # Logging — PCI-DSS Req. 10 (audit all access to DNS infrastructure)
    # Logs go to syslog (/var/log/syslog) and are rotated by rsyslog.
    # WARNING: log-queries: yes generates high syslog volume on busy servers.
    # -------------------------------------------------------------------------

    use-syslog: yes
    verbosity: 1
    log-queries: yes
    log-replies: yes
    log-servfail: yes

    # -------------------------------------------------------------------------
    # Local zone — prevent internal names from leaking to upstream resolvers
    # -------------------------------------------------------------------------

    local-zone: "localhost." static
    local-data: "localhost. 10800 IN A 127.0.0.1"
    local-zone: "127.in-addr.arpa." static
    local-data: "1.0.0.127.in-addr.arpa. 10800 IN PTR localhost."

# =============================================================================
# Remote control — Unix domain socket (no key files required)
# Use: sudo unbound-control stats_noreset
#      sudo unbound-control reload
# =============================================================================

remote-control:
    control-enable: yes
    control-interface: /run/unbound.ctl
