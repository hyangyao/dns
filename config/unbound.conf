# =============================================================================
# unbound.conf — 适用于 Azure B2ast（2 vCPU / 1 GB RAM）的生产级 Unbound 配置
#
# 部署位置：日本东部 — 针对中国青岛客户端优化
# 合规标准：CIS DNS 基准 · PCI-DSS v4.0
# 操作系统：Ubuntu 22.04 / 24.04 LTS（Unbound ≥ 1.13）
#
# DoT（853端口）在此处保持禁用，直至 TLS 证书申请完成。
# 请运行 scripts/setup-tls.sh 以在证书签发后启用 DoT。
# =============================================================================

server:
    # -------------------------------------------------------------------------
    # 监听接口与协议栈
    # -------------------------------------------------------------------------

    # 在所有 IPv4 接口上监听普通 DNS 查询
    interface: 0.0.0.0
    port: 53

    # DoT（853端口）— 仅在运行 scripts/setup-tls.sh 后取消注释
    # interface: 0.0.0.0@853

    # 明确禁用 IPv6，与 sysctl（net.ipv6.conf.all.disable_ipv6=1）保持一致
    do-ip4: yes
    do-ip6: no

    # -------------------------------------------------------------------------
    # 访问控制 — 防放大攻击 · PCI-DSS 要求1
    # 默认拒绝所有来源；请在下方将需要的客户端 IP 加入白名单。
    # -------------------------------------------------------------------------

    access-control: 0.0.0.0/0 refuse

    # 允许回环地址（健康检查和 unbound-control 所需）
    access-control: 127.0.0.0/8 allow

    # 在此处添加您的客户端 CIDR — 请替换为您的实际 IP 或子网：
    # access-control: <您的客户端IP>/32 allow
    # access-control: <您的子网>/24  allow

    # -------------------------------------------------------------------------
    # 内存 — 针对 1 GB RAM 上限（防止内存溢出）
    # 缓存预算约 192 MB（约占 1 GB 的 19%）：
    #   rrset-cache-size = 128 MB  （存储 RRset，约占预算的 67%）
    #   msg-cache-size   =  64 MB  （存储完整响应，约占预算的 33%）
    #   key-cache-size   =  16 MB  （存储 DNSSEC 密钥）
    # -------------------------------------------------------------------------

    msg-cache-size: 64m
    rrset-cache-size: 128m
    key-cache-size: 16m

    # 基础架构缓存：跟踪 RTT 和故障服务器（保持较小）
    infra-cache-numhosts: 10000

    # -------------------------------------------------------------------------
    # 线程与分片调优 — 2 个 vCPU
    # -------------------------------------------------------------------------

    # 每个物理 CPU 核心一个线程
    num-threads: 2

    # 分片数必须是 2 的幂次且 >= num-threads；将缓存分区以
    # 减少线程间的互斥锁竞争
    msg-cache-slabs: 2
    rrset-cache-slabs: 2
    infra-cache-slabs: 2
    key-cache-slabs: 2

    # -------------------------------------------------------------------------
    # 网络性能
    # -------------------------------------------------------------------------

    # 400 个出口端口 × 2 个线程 = 800 个并发上游查询；
    # 在并发性与 1 GB RAM 预算之间取得平衡
    outgoing-range: 400

    # 套接字缓冲区 — 大小与 sysctl rmem_max/wmem_max（4 MB）匹配
    so-rcvbuf: 4m
    so-sndbuf: 4m

    # 每个线程的入站查询队列深度
    num-queries-per-thread: 1024

    # -------------------------------------------------------------------------
    # DoT — DNS over TLS 配置占位符
    # 这些行在 interface: 0.0.0.0@853 取消注释之前不会生效。
    # 启用方式：sudo bash scripts/setup-tls.sh <域名> <邮箱>
    # -------------------------------------------------------------------------

    # tls-service-key: "/etc/letsencrypt/live/您的域名/privkey.pem"
    # tls-service-pem: "/etc/letsencrypt/live/您的域名/fullchain.pem"
    # tls-min-version: "TLSv1.2"

    # -------------------------------------------------------------------------
    # 隐私与安全加固
    # CIS DNS 基准 2.x · PCI-DSS 要求2（消除供应商默认配置）
    # -------------------------------------------------------------------------

    # 隐藏服务器软件身份 — 防止指纹识别（CIS DNS 2.1）
    hide-identity: yes
    hide-version: yes

    # QNAME 最小化 — RFC 7816；向上游发送最少的查询信息以保护隐私
    qname-minimisation: yes

    # 0x20 随机大小写欺骗检测（Kaminsky 变体攻击缓解）
    use-caps-for-id: yes

    # DNSSEC 加固
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-below-nxdomain: yes
    harden-algo-downgrade: yes

    # 注意：harden-referral-path 有意不启用；启用后会对 NS 委派路径未签名的
    # 合法域名（大型 CDN 和云服务商普遍存在此情况）产生 DNSSEC 误报失败。

    # TTL 边界 — 缓解负缓存攻击和过期投毒
    cache-min-ttl: 60
    cache-max-ttl: 86400

    # DNSSEC 信任锚 — 由 deploy.sh 中的 unbound-anchor 初始化
    auto-trust-anchor-file: "/var/lib/unbound/root.key"

    # 根提示文件 — 首次运行时由 deploy.sh 更新
    root-hints: "/var/lib/unbound/root.hints"

    # -------------------------------------------------------------------------
    # 性能与预取
    # -------------------------------------------------------------------------

    # 在 TTL 到期前刷新热门记录，减少缓存未命中
    prefetch: yes
    prefetch-key: yes

    # 在上游不可用时提供过期记录（容忍1小时）。
    # 当中日链路间歇性不可达时尤为有用。
    serve-expired: yes
    serve-expired-ttl: 3600

    # -------------------------------------------------------------------------
    # 速率限制 — PCI-DSS 要求6（防 DNS 放大攻击）
    # -------------------------------------------------------------------------

    # 每权威区的 QPS 上限；超出后返回 REFUSED
    ratelimit: 1000

    # 每客户端 IP 的查询速率上限
    ip-ratelimit: 100

    # -------------------------------------------------------------------------
    # 日志 — PCI-DSS 要求10（审计所有 DNS 基础设施访问）
    # 日志发送至 syslog（/var/log/syslog），由 rsyslog 进行轮转。
    # 警告：在繁忙服务器上 log-queries: yes 会产生大量 syslog 流量。
    # -------------------------------------------------------------------------

    use-syslog: yes
    verbosity: 1
    log-queries: yes
    log-replies: yes
    log-servfail: yes

    # -------------------------------------------------------------------------
    # 本地区域 — 防止内部域名泄漏到上游解析器
    # -------------------------------------------------------------------------

    local-zone: "localhost." static
    local-data: "localhost. 10800 IN A 127.0.0.1"
    local-zone: "127.in-addr.arpa." static
    local-data: "1.0.0.127.in-addr.arpa. 10800 IN PTR localhost."

# =============================================================================
# 远程控制 — Unix 域套接字（无需密钥文件）
# 使用方式：sudo unbound-control stats_noreset
#           sudo unbound-control reload
# =============================================================================

remote-control:
    control-enable: yes
    control-interface: /run/unbound.ctl
