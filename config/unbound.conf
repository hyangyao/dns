# =============================================================================
# unbound.conf — Optimized for Azure B2ast (2 vCPU / 1 GB RAM), Japan East
#
# Compliance: CIS DNS Benchmark · PCI-DSS v4.0
# Client:     Qingdao, China — DNS over TLS (port 853) for cross-border privacy
# =============================================================================

server:
    # -------------------------------------------------------------------------
    # Interfaces & ports
    # -------------------------------------------------------------------------

    # Listen on all interfaces for both plain DNS and DoT
    interface: 0.0.0.0
    interface: 0.0.0.0@853       # DoT port — requires tls-service-key/pem below

    port: 53

    # -------------------------------------------------------------------------
    # Access control (anti-amplification)
    # PCI-DSS Req. 1: Only permit explicitly required sources
    # -------------------------------------------------------------------------

    # Deny all by default
    access-control: 0.0.0.0/0 refuse
    access-control: ::0/0 refuse

    # Allow loopback (for local health checks)
    access-control: 127.0.0.0/8 allow

    # Allow your Qingdao client IP or subnet — replace with your actual IP/CIDR
    # Example: access-control: 1.2.3.4/32 allow
    # access-control: <YOUR_QINGDAO_IP>/32 allow

    # -------------------------------------------------------------------------
    # Memory optimization — strict limits for 1 GB RAM (OOM prevention)
    # Total DNS cache budget ≈ 192 MB (≈19% of 1 GB RAM)
    #   rrset-cache-size = 128 MB (≈67% of budget)
    #   msg-cache-size   =  64 MB (≈33% of budget)
    # -------------------------------------------------------------------------

    msg-cache-size: 64m
    rrset-cache-size: 128m
    key-cache-size: 16m

    # Limit the number of cached records to avoid runaway memory growth
    msg-cache-numhosts: 100000
    rrset-cache-numhosts: 100000

    # -------------------------------------------------------------------------
    # Thread & slab tuning — 2 vCPUs
    # -------------------------------------------------------------------------

    # One thread per CPU core
    num-threads: 2

    # Slabs must be a power of 2; >= num-threads reduces lock contention
    msg-cache-slabs: 2
    rrset-cache-slabs: 2
    infra-cache-slabs: 2
    key-cache-slabs: 2

    # -------------------------------------------------------------------------
    # Network performance
    # -------------------------------------------------------------------------

    # Number of outgoing ports per thread (400 × 2 threads = 800 concurrent upstream
    # queries; balances concurrency with the 1 GB RAM memory budget)
    outgoing-range: 400

    # Socket buffer sizes (match sysctl rmem_max/wmem_max)
    so-rcvbuf: 4m
    so-sndbuf: 4m

    # Allow more simultaneous incoming queries
    num-queries-per-thread: 1024

    # -------------------------------------------------------------------------
    # DoT — DNS over TLS (port 853)
    # Replace placeholder paths with actual Let's Encrypt certificate paths
    # after running: certbot certonly --standalone -d <your-domain>
    # -------------------------------------------------------------------------

    # tls-service-key: "/etc/letsencrypt/live/dns.example.com/privkey.pem"
    # tls-service-pem: "/etc/letsencrypt/live/dns.example.com/fullchain.pem"

    # Minimum TLS version (PCI-DSS Req. 4: TLS 1.2+)
    tls-min-version: "TLSv1.2"

    # -------------------------------------------------------------------------
    # Privacy & security hardening
    # CIS DNS Benchmark 2.x / PCI-DSS Req. 2 (no vendor defaults)
    # -------------------------------------------------------------------------

    # Hide server identity (prevents fingerprinting)
    hide-identity: yes
    hide-version: yes
    identity: ""

    # QNAME minimisation — send minimal query data to upstream (RFC 7816)
    qname-minimisation: yes

    # Use random case in queries to detect spoofing (0x20 encoding)
    use-caps-for-id: yes

    # DNSSEC hardening
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-below-nxdomain: yes
    harden-referral-path: yes
    harden-algo-downgrade: yes

    # Reject very short TTLs from upstream (cache poisoning mitigation)
    cache-min-ttl: 60
    cache-max-ttl: 86400

    # DNSSEC trust anchor (managed by unbound-anchor)
    auto-trust-anchor-file: "/var/lib/unbound/root.key"

    # Root hints (updated by deploy.sh)
    root-hints: "/var/lib/unbound/root.hints"

    # -------------------------------------------------------------------------
    # Performance & prefetching
    # -------------------------------------------------------------------------

    # Prefetch popular records before TTL expiry
    prefetch: yes
    prefetch-key: yes

    # Serve expired records while re-validating (improves availability on the
    # China–Japan link where upstream servers may be temporarily unreachable;
    # 3600s = 1 hour stale tolerance, balancing freshness with resilience)
    serve-expired: yes
    serve-expired-ttl: 3600

    # -------------------------------------------------------------------------
    # Rate limiting — anti-DNS amplification (PCI-DSS Req. 6)
    # -------------------------------------------------------------------------

    # Maximum queries per second per IP before REFUSED is returned
    ratelimit: 1000

    # Per-IP rate limit (clients that send many queries)
    ip-ratelimit: 100

    # -------------------------------------------------------------------------
    # Logging — PCI-DSS Req. 10 (audit all access)
    # -------------------------------------------------------------------------

    # Log to syslog (forward to your SIEM / log aggregator)
    use-syslog: yes
    log-queries: yes
    log-replies: yes
    log-servfail: yes
    log-tag-queryreply: yes

    # Verbosity: 1 = operational, 2 = detailed (use 1 in production)
    verbosity: 1

    # -------------------------------------------------------------------------
    # Miscellaneous
    # -------------------------------------------------------------------------

    # Do not use the local /etc/hosts file for resolution
    local-zone: "localhost." static

    # Unbound control socket (for unbound-control stats)
    # Enabled via remote-control section below

remote-control:
    control-enable: yes
    control-interface: 127.0.0.1
    control-port: 8953
    # Control interface uses a local Unix socket by default in many distros;
    # if using TCP, generate keys with: unbound-control-setup
