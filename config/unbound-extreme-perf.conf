# =============================================================================
# unbound-extreme-perf.conf — 极致性能 Unbound 配置
#
# 目标机器：Azure B2ast（2 vCPU / 1 GB RAM）— 日本东部区域
# 客户端位置：中国青岛（跨境高延迟、GFW 污染对抗）
# 合规标准：CIS DNS 基准 · PCI-DSS v4.0
# 操作系统：Ubuntu 22.04 / 24.04 LTS（Unbound ≥ 1.13）
#
# 【内存安全数学推导 — 零 OOM 风险】
# 1 GB = 1024 MB 总物理内存
#
# 内存消耗分解：
#   操作系统内核 + systemd + 基础服务      ≈ 200 MB
#   Unbound 进程基础开销（2线程 × 8MB栈）  ≈  16 MB
#   fail2ban + auditd + sshd + ufw        ≈  30 MB
#   chroot 环境开销                        ≈   4 MB
#   ─────────────────────────────────────────────────
#   系统预留合计                           ≈ 250 MB
#   可用于缓存的安全预算                   ≈ 774 MB
#   实际缓存上限（留 624 MB 余量）         = 150 MB  ← 极度保守
#
# 缓存内部分配：
#   msg-cache-size:   50m  — 消息缓存（完整响应元数据，引用 RRset）
#   rrset-cache-size: 100m — RRset 缓存（实际 DNS 资源记录，数据更大）
#   合计缓存占用      150m — 约占总 RAM 的 14.6%，OOM 风险为零
#
# 【1:2 比例原理】
#   每条 msg-cache 条目引用 1–N 条 rrset-cache 条目。
#   将 rrset-cache 设为 msg-cache 的 2 倍，确保 rrset 命中率 ≥ msg 命中率，
#   避免"消息命中但 RRset 已驱逐"导致的重复递归查询。
#
# 部署方法：
#   sudo cp config/unbound-extreme-perf.conf /etc/unbound/unbound.conf.d/extreme-perf.conf
#   sudo unbound-checkconf
#   sudo systemctl reload unbound
# =============================================================================

server:
    # -------------------------------------------------------------------------
    # chroot 隔离沙箱 — CIS DNS 基准 / PCI-DSS 要求2
    #
    # 将 Unbound 进程限制在 /etc/unbound 目录内，即使进程被利用，
    # 攻击者也无法访问沙箱外的系统文件。
    # 注意：chroot 启用后，所有路径（root-hints、anchor 等）
    #       必须相对于 chroot 目录填写，deploy-ha-dns.sh 会处理此绑定。
    # -------------------------------------------------------------------------
    chroot: "/etc/unbound"

    # -------------------------------------------------------------------------
    # 监听接口与端口
    # -------------------------------------------------------------------------
    interface: 0.0.0.0
    port: 53

    # DoT（853 端口）— 运行 scripts/setup-tls.sh 后取消注释
    # interface: 0.0.0.0@853

    # 禁用 IPv6（与 sysctl net.ipv6.conf.all.disable_ipv6=1 保持一致）
    do-ip4: yes
    do-ip6: no
    do-udp: yes
    do-tcp: yes

    # -------------------------------------------------------------------------
    # 访问控制 — 防放大攻击 · PCI-DSS 要求1
    # -------------------------------------------------------------------------
    access-control: 0.0.0.0/0 refuse
    access-control: 127.0.0.0/8 allow

    # 在此添加授权客户端 IP 或子网（替换为实际值）：
    # access-control: <青岛客户端IP>/32 allow
    # access-control: <青岛子网>/24    allow

    # -------------------------------------------------------------------------
    # 内存分配 — 零 OOM 风险（见顶部数学推导）
    #
    # msg-cache-size:   50m  ← 消息缓存
    # rrset-cache-size: 100m ← RRset 缓存（msg-cache 的 2 倍）
    # 合计 150MB，约占 1GB RAM 的 14.6%，为系统留出 874MB 安全余量
    # -------------------------------------------------------------------------
    msg-cache-size: 50m
    rrset-cache-size: 100m

    # DNSSEC 密钥缓存（保持较小，避免超出内存预算）
    key-cache-size: 8m

    # 基础架构缓存（跟踪权威服务器 RTT，内存占用微小）
    infra-cache-numhosts: 10000

    # -------------------------------------------------------------------------
    # CPU 线程与缓存分片 — 2 vCPU 最优配置
    #
    # num-threads: 2        — 每个物理核一个线程，无上下文切换开销
    # *-cache-slabs: 2      — 分片数 = 线程数，最大化减少 mutex 竞争
    #                         （分片数必须是 2 的幂次 且 ≥ num-threads）
    # -------------------------------------------------------------------------
    num-threads: 2
    msg-cache-slabs: 2
    rrset-cache-slabs: 2
    infra-cache-slabs: 2
    key-cache-slabs: 2

    # -------------------------------------------------------------------------
    # 高并发网络性能
    #
    # so-reuseport: yes — 允许多线程共享同一端口，内核自动负载均衡，
    #                     消除单套接字接收瓶颈（多线程 DNS 核心优化）。
    #
    # edns-buffer-size: 1232 — 防止中日跨境链路 IP 分片。
    #   推导：IPv6 最小 MTU（1280） − IPv6头（40） − UDP头（8） = 1232 字节
    #   适用于 IPv4/IPv6 双栈路径，避免因 PMTU 不一致导致的 UDP 分片丢包。
    # -------------------------------------------------------------------------
    so-reuseport: yes
    edns-buffer-size: 1232

    outgoing-range: 400
    num-queries-per-thread: 1024

    so-rcvbuf: 4m
    so-sndbuf: 4m

    # -------------------------------------------------------------------------
    # 跨境延迟消除 — 核心策略（针对青岛-日本链路）
    #
    # serve-expired: yes
    #   当上游权威服务器超时或 GFW 干扰时，返回已过期的缓存记录（而非 SERVFAIL）。
    #   将"上游不可达"导致的客户端感知故障转化为"轻微数据陈旧"，
    #   大幅提升跨境链路上的服务连续性。
    #
    # serve-expired-ttl: 172800（48小时）
    #   过期记录最长可提供服务 48 小时。
    #   对于中国 CDN 域名（百度、腾讯、阿里云等），A 记录变更频率远低于
    #   跨境链路故障频率，48 小时的容忍度覆盖绝大多数维护窗口。
    #
    # prefetch: yes
    #   在热门记录 TTL 剩余 10% 时提前刷新缓存，消除缓存过期造成的延迟峰值。
    #
    # prefetch-key: yes
    #   同步预取 DNSSEC 密钥，确保验证所需密钥始终缓存命中。
    # -------------------------------------------------------------------------
    serve-expired: yes
    serve-expired-ttl: 172800

    prefetch: yes
    prefetch-key: yes

    # TTL 边界 — 防缓存穿透攻击与过期记录投毒
    cache-min-ttl: 60
    cache-max-ttl: 86400

    # -------------------------------------------------------------------------
    # 高负载 / DoS 防护
    #
    # ratelimit: 1000
    #   每个权威区每秒最大递归查询数，超出后返回 REFUSED（而非 DROP），
    #   防止 DNS 放大攻击的同时允许合法流量感知被限制。
    #
    # unwanted-reply-threshold: 10000
    #   当未请求的响应（可能是欺骗/放大攻击）达到阈值时，
    #   Unbound 自动清洗缓存并记录日志，快速恢复服务状态。
    #
    # deny-any: yes
    #   拒绝 QTYPE=ANY 查询（RFC 8482 建议）。
    #   ANY 查询是 DNS 放大攻击的主要载体，响应体积可达请求的 40–70 倍，
    #   启用后直接拒绝，显著降低被用于放大攻击的风险。
    # -------------------------------------------------------------------------
    ratelimit: 1000
    ip-ratelimit: 100
    unwanted-reply-threshold: 10000
    deny-any: yes

    # -------------------------------------------------------------------------
    # 安全与合规加固 — CIS DNS 基准 · PCI-DSS 要求2
    #
    # hide-identity: yes  — 禁止通过 CHAOS TXT id.server 查询暴露主机名
    # hide-version: yes   — 禁止通过 version.bind 查询暴露软件版本
    # harden-glue: yes    — 拒绝非权威的胶水（glue）记录，防止缓存投毒
    # use-caps-for-id: yes — 0x20 随机大小写（Kaminsky 攻击变种缓解）
    # -------------------------------------------------------------------------
    hide-identity: yes
    hide-version: yes
    hide-trustanchor: yes

    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-below-nxdomain: yes
    harden-algo-downgrade: yes

    use-caps-for-id: yes

    qname-minimisation: yes
    minimal-responses: yes

    # -------------------------------------------------------------------------
    # DNSSEC 信任锚与根提示
    #
    # 注意：启用 chroot: "/etc/unbound" 后，所有路径相对于 chroot 根目录解析。
    # deploy-ha-dns.sh 会在 /etc/unbound/ 内创建必要的目录结构：
    #   /etc/unbound/var/lib/unbound/root.key
    #   /etc/unbound/var/lib/unbound/root.hints
    # -------------------------------------------------------------------------
    auto-trust-anchor-file: "/var/lib/unbound/root.key"
    root-hints: "/var/lib/unbound/root.hints"

    # -------------------------------------------------------------------------
    # DoT TLS 配置占位符（运行 scripts/setup-tls.sh 后激活）
    # -------------------------------------------------------------------------
    # tls-service-key: "/etc/letsencrypt/live/your-domain/privkey.pem"
    # tls-service-pem: "/etc/letsencrypt/live/your-domain/fullchain.pem"
    # tls-min-version: "TLSv1.2"

    # -------------------------------------------------------------------------
    # 日志 — PCI-DSS 要求10（审计所有 DNS 访问）
    # -------------------------------------------------------------------------
    use-syslog: yes
    verbosity: 1
    log-queries: yes
    log-replies: yes
    log-servfail: yes

    # -------------------------------------------------------------------------
    # 本地区域 — 防止内部域名泄漏到上游
    # -------------------------------------------------------------------------
    local-zone: "localhost." static
    local-data: "localhost. 10800 IN A 127.0.0.1"
    local-zone: "127.in-addr.arpa." static
    local-data: "1.0.0.127.in-addr.arpa. 10800 IN PTR localhost."

# =============================================================================
# 上游转发区（DNS over TLS — 防 GFW 污染）
#
# 所有递归查询通过 TLS（853 端口）加密转发到境外知名 DoT 服务器，
# GFW 无法在 TLS 会话内注入伪造的 DNS 响应，彻底消除 DNS 污染风险。
# =============================================================================

forward-zone:
    name: "."

    # Cloudflare DNS over TLS
    forward-addr: 1.1.1.1@853#cloudflare-dns.com
    forward-addr: 1.0.0.1@853#cloudflare-dns.com

    # Google DNS over TLS
    forward-addr: 8.8.8.8@853#dns.google
    forward-addr: 8.8.4.4@853#dns.google

    # 强制上游使用 TLS（禁止降级到明文 UDP/TCP）
    forward-tls-upstream: yes

# =============================================================================
# 远程控制 — Unix 域套接字（无需 TLS 密钥文件）
# 使用：sudo unbound-control stats_noreset
#       sudo unbound-control reload
#       sudo unbound-control flush_zone example.com
# =============================================================================

remote-control:
    control-enable: yes
    control-interface: /run/unbound.ctl
